name: Linting

on:
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: Use Node 10
      uses: actions/setup-node@v1
      #with:
        #node-version: 10.19.x
    - run: npm install -g yarn

    - name: Install Dependencies
      run: yarn

    - name: Lint
      run: yarn lint
